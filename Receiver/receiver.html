<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CastMirror Receiver</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #mirror {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }
    #video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: none;
    }
    #status {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #aaa;
      font-family: -apple-system, sans-serif;
      font-size: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <img id="mirror" style="display:none" />
  <video id="video" autoplay></video>
  <div id="status">Waiting for stream...</div>

  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    const NAMESPACE = 'urn:x-cast:com.castmirror.stream';
    // Fix #10: Limit retries so transient errors don't loop forever.
    const MAX_RETRIES = 10;
    const RETRY_DELAY_MS = 500;

    const context = cast.framework.CastReceiverContext.getInstance();
    const img = document.getElementById('mirror');
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let currentMode = null; // 'mirror' or 'video'

    const options = new cast.framework.CastReceiverOptions();
    options.maxInactivity = 3600;
    options.disableIdleTimeout = true;

    context.addCustomMessageListener(NAMESPACE, (event) => {
      console.log('Received message:', typeof event.data, event.data);
      const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
      if (data.type === 'stream') {
        console.log('Starting MJPEG stream:', data.url);
        stopAll();
        startMirrorStream(data.url);
      } else if (data.type === 'video') {
        console.log('Starting video stream:', data.url);
        stopAll();
        startVideoStream(data.url);
      } else if (data.type === 'stop') {
        stopAll();
      }
    });

    function startMirrorStream(url) {
      currentMode = 'mirror';
      let retries = 0;

      status.style.display = 'none';
      img.style.display = 'block';
      img.src = url;

      img.onerror = () => {
        retries++;
        if (retries > MAX_RETRIES) {
          img.style.display = 'none';
          img.src = '';
          status.textContent = 'Stream lost. Reconnect from the app.';
          status.style.display = 'block';
          return;
        }
        setTimeout(() => {
          img.src = url + '?t=' + Date.now();
        }, RETRY_DELAY_MS);
      };
    }

    function startVideoStream(url) {
      currentMode = 'video';
      status.style.display = 'none';
      video.style.display = 'block';

      video.src = url;
      video.play().catch(function(err) {
        console.error('Video play error:', err);
        status.textContent = 'Failed to play stream.';
        status.style.display = 'block';
        video.style.display = 'none';
      });

      video.onerror = function() {
        console.error('Video element error');
        status.textContent = 'Stream error. Try another channel.';
        status.style.display = 'block';
        video.style.display = 'none';
      };
    }

    function stopAll() {
      img.style.display = 'none';
      img.src = '';
      img.onerror = null;

      video.pause();
      video.src = '';
      video.style.display = 'none';
      video.onerror = null;

      currentMode = null;
      status.textContent = 'Stream stopped';
      status.style.display = 'block';
    }

    context.start(options);
  </script>
</body>
</html>
